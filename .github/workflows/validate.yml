name: Validate skills

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python3 tests/validate_skills.py
      - run: python3 tests/test_model_ranking.py
      - run: bash tests/test_chrome_launcher.sh

